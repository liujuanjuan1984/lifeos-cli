version: 2

updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    allow:
      - dependency-type: "direct"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-patch"
    commit-message:
      prefix: "deps"
    labels:
      - "backend"
      - "dependencies"
    groups:
      uv-all-updates:
        applies-to: "version-updates"
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    allow:
      - dependency-type: "production"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-patch"
      - dependency-type: "development"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-patch"
    commit-message:
      prefix: "deps(web)"
    labels:
      - "frontend"
      - "dependencies"
    groups:
      web-runtime:
        applies-to: "version-updates"
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"
      web-tooling:
        applies-to: "version-updates"
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"
